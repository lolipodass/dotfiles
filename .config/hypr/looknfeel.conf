# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows or borders
    gaps_in = 5
    gaps_out = 10
    layout = scrolling
}

scrolling {
    fullscreen_on_one_column = true
    column_width = 0.95
    focus_fit_method = 0
    direction = right
}
# misc{
#     size_limits_tiled= true
# }
# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
     rounding = 5
     rounding_power = 2
     shadow {
       enabled = true
       range = 4
       render_power = 3
       color = rgba(1a1a1aee)
     }
     blur {
       enabled = true
       size = 3
       passes = 2
       vibrancy = 0.1696
     }
}


layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0
  match:namespace = vicinae
}

windowrule {
  name = windowrule-3
  float = on
  center = on
  min_size = 0 0
  match:class = Windscribe
}

windowrule {
  name = windowrule-4
  float = on
  match:class = org.omarchy.gazelle
}

windowrule{
    name = kitty
    # float = on
    size = 600 100
    match:class = kitty
}

